<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNCP Smart Welfare Portal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>BNCP Smart Welfare Portal</h1>
</header>

<div class="container">

    <div class="card">
        <h2>📢 공지사항</h2>
        <p>오늘 등록된 공지가 없습니다.</p>
    </div>

    <div class="card">
        <h2>🍱 오늘의 식단</h2>
        <p>아침 : Toast</p>
        <p>점심 : Chicken Rice</p>
        <p>저녁 : Beef Steak</p>
    </div>

    <div class="card">
        <h2>🌤 오늘의 날씨</h2>
        <p>36℃ Sunny</p>
    </div>

    <!-- 여기만 교체 -->
    <div class="card">

        <h2>🤖 BNCP AI 직원도우미</h2>

        <input
            id="question"
            type="text"
            placeholder="질문을 입력하세요">

        <br><br>

        <button onclick="askAI()">
            질문하기
        </button>

        <br><br>

        <div id="answer">
            무엇을 도와드릴까요?
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
