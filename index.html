<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNCP AI 비서</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #202124;
      color: #e8eaed;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      gap: 16px;
      font-size: 14px;
    }

    header a {
      color: #e8eaed;
      text-decoration: none;
      cursor: pointer;
    }

    header a:hover {
      text-decoration: underline;
    }

    .profile-icon {
      width: 32px;
      height: 32px;
      background-color: #8ab4f8;
      color: #202124;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -50px;
    }

    .logo {
      font-size: 5rem;
      font-weight: 600;
      letter-spacing: -2px;
      margin-bottom: 28px;
      user-select: none;
    }

    .search-box {
      width: 100%;
      max-width: 584px;
      height: 48px;
      background-color: #303134;
      border: 1px solid #5f6368;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      transition: background-color 0.2s, box-shadow 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      background-color: #303134;
      border-color: transparent;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8eaed;
      font-size: 16px;
      margin-left: 12px;
    }

    .btn-group {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    .btn {
      background-color: #303134;
      border: 1px solid #303134;
      color: #e8eaed;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .btn:hover {
      border: 1px solid #5f6368;
    }

    .response-area {
      width: 100%;
      max-width: 584px;
      margin-top: 24px;
      background-color: #303134;
      border: 1px solid #5f6368;
      border-radius: 12px;
      padding: 16px 20px;
      display: none;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: #303134;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #3c4043;
    }

    .modal-header h2 {
      font-size: 1.25rem;
      color: #8ab4f8;
    }

    .close-btn {
      background: none;
      border: none;
      color: #9aa0a6;
      font-size: 24px;
      cursor: pointer;
    }

    .close-btn:hover {
      color: #e8eaed;
    }

    .tab-bar {
      display: flex;
      background-color: #202124;
      overflow-x: auto;
      border-bottom: 1px solid #3c4043;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: #9aa0a6;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: #8ab4f8;
      border-bottom-color: #8ab4f8;
      background-color: #303134;
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .meal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .meal-card {
      background-color: #202124;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #3c4043;
    }

    .meal-card h3 {
      font-size: 1rem;
      color: #8ab4f8;
      margin-bottom: 12px;
      border-bottom: 1px solid #3c4043;
      padding-bottom: 6px;
    }

    .meal-card ul {
      list-style: none;
    }

    .meal-card li {
      font-size: 14px;
      margin-bottom: 6px;
      color: #bdc1c6;
    }

    .pdf-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #3c4043;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #8ab4f8;
      color: #202124;
      padding: 8px 16px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .pdf-btn:hover {
      background-color: #a6c8ff;
    }

    footer {
      background-color: #171717;
      color: #9aa0a6;
      font-size: 14px;
    }

    .footer-top {
      padding: 14px 30px;
      border-bottom: 1px solid #212327;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 14px 30px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: #9aa0a6;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <a href="#">안내사항</a>
    <a onclick="openMenuModal()">식단표</a>
    <div class="profile-icon">AI</div>
  </header>

  <main>
    <div class="logo">BNCP AI</div>
    
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#9aa0a6">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="userInput" placeholder="질문이나 요청사항을 입력하세요..." onkeydown="if(event.key==='Enter') handleSearch()">
    </div>

    <div class="btn-group">
      <button class="btn" onclick="handleSearch()">AI 답변 요청</button>
      <button class="btn" onclick="openMenuModal()">주간 식단표 확인</button>
    </div>

    <div class="response-area" id="responseArea"></div>
  </main>

  <div class="modal-overlay" id="menuModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>주간 식단표 (7/18 ~ 7/24)</h2>
        <button class="close-btn" onclick="closeMenuModal()">&times;</button>
      </div>

      <div class="tab-bar" id="tabBar"></div>

      <div class="modal-body">
        <div class="meal-grid" id="mealGrid"></div>

        <div class="pdf-section">
          <span>📄 원본 PDF 파일 확인:</span>
          <a href="메뉴판2.pdf" target="_blank" class="pdf-btn">
            PDF 파일 열기 / 다운로드
          </a>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-top">
      <span>Bismayah Camp Services</span>
    </div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">소개</a>
        <a href="#">복지 안내</a>
        <a href="#">시설 문의</a>
      </div>
      <div class="footer-links">
        <a href="#">개인정보처리방침</a>
        <a href="#">설정</a>
      </div>
    </div>
  </footer>

  <script>
    const BACKEND_API_URL = "https://odd-butterfly-b936.chogak1449.workers.dev/";

    const weeklyData = [
      {
        date: "토(7/18)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "바지락무국", "진미채볶음", "양념깻잎지", "오이생채", "배추김치", "야채샐러드/토마토", "모닝빵/잼/버터", "시리얼/우유"],
          "중식": ["쌀밥", "우동장국", "쫄면", "군만두", "단무지", "배추김치", "야채스틱/쌈장", "과일", "커피/음료"],
          "석식": ["쌀밥", "소고기미역국", "칠리새우", "양송이버섯볶음", "우거지나물", "배추김치", "야채스틱/쌈장", "과일"]
        }
      },
      {
        date: "일(7/19)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "시래기해장국", "가자미구이", "계란밥", "우동", "겉절이", "콩자반", "마늘종무침", "배추김치"],
          "중식": ["김치볶음밥 / 쌀밥(땡초장)", "미소된장국 / 호박두부젓국", "간장돼지불고기", "간장치킨", "야채샐러드", "양배추쌈", "치킨무", "상추겉절이"],
          "석식": ["쌀밥", "바지락칼국수", "족발 / 새우젓", "무말랭이무침", "겉절이", "야채스틱/쌈장", "과일"]
        }
      },
      {
        date: "월(7/20)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "관자살해장국", "잡채해물완자", "고사리나물", "오이지무침", "배추김치"],
          "중식": ["쌀밥 / 잡곡밥", "나박김치", "갈비찜", "생선전", "배추김치", "야채스틱/쌈장", "과일"],
          "석식": ["쌀밥", "장터국밥", "임연수구이", "낙지젓", "치커리나물", "깍두기", "야채스틱/쌈장", "과일"]
        }
      },
      {
        date: "화(7/21)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "나주곰탕", "오징어젓", "취나물", "깍두기"],
          "중식": ["쌀밥 / 잡곡밥", "가지오이냉국", "닭볶음탕", "고추튀김", "상추겉절이", "배추김치"],
          "석식": ["쌀밥", "짬뽕탕", "고추잡채 / 꽃빵", "공심채무침", "배추김치", "야채스틱/쌈장", "과일"]
        }
      },
      {
        date: "수(7/22)",
        meals: {
          "조식": ["쌀밥", "떡라면", "배추김치", "야채샐러드/토마토", "모닝빵/잼/버터"],
          "중식": ["쌀밥 / 잡곡밥", "돼지고기김치찌개", "계란말이", "명엽채볶음", "다래순나물", "배추김치"],
          "석식": ["쌀밥 / 바게트빵", "빼쉐파스타", "고구마치즈고로케", "샐러드", "오이/무피클", "배추김치"]
        }
      },
      {
        date: "목(7/23)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "황태해장국", "소고기가지볶음", "돌자반", "양념고추지", "배추김치"],
          "중식": ["새우볶음밥", "계란탕", "후라이드치킨", "치킨무", "배추김치"],
          "석식": ["쌀밥 / 잡곡밥", "건새우근대된장국", "닭가슴살양배추볶음", "월남쌈", "무생채", "배추김치"]
        }
      },
      {
        date: "금(7/24)",
        meals: {
          "조식": ["쌀밥 / 잡곡밥", "황태해장국", "배추김치", "야채샐러드/토마토"],
          "중식": ["일반식", "주간 특식 코너", "배추김치", "야채스틱/쌈장", "과일"],
          "석식": ["뉴욕핫도그", "치킨너겟", "코올슬로샐러드", "음료", "야채스틱/쌈장", "과일"]
        }
      }
    ];

    let currentTabIndex = 0;

    async function handleSearch() {
      const inputInput = document.getElementById('userInput');
      const responseArea = document.getElementById('responseArea');
      const query = inputInput.value.trim();
      
      if (!query) return;

      inputInput.value = "";
      inputInput.disabled = true;
      responseArea.style.display = "block";
      responseArea.innerHTML = "🤖 AI가 답변을 생성하고 있습니다...";

      try {
        const response = await fetch(BACKEND_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: query }),
        });

        if (!response.ok) throw new Error("서버 응답 오류: " + response.status);

        const data = await response.json();
        const aiReply = data.reply || data.response || "답변을 수신했습니다.";

        responseArea.innerHTML = "<strong>🤖 AI 비서 답변:</strong><br><br>" + aiReply;

      } catch (error) {
        console.error("통신 에러:", error);
        responseArea.innerHTML = "⚠️ 답변을 불러오는 중 오류가 발생했습니다.<br>Cloudflare Worker API 주소(" + BACKEND_API_URL + ") 및 상태를 확인해 주세요.";
      } finally {
        inputInput.disabled = false;
        inputInput.focus();
      }
    }

    function openMenuModal() {
      document.getElementById('menuModal').style.display = 'flex';
      renderTabs();
      showMealDay(currentTabIndex);
    }

    function closeMenuModal() {
      document.getElementById('menuModal').style.display = 'none';
    }

    function renderTabs() {
      const tabBar = document.getElementById('tabBar');
      tabBar.innerHTML = '';

      weeklyData.forEach((day, index) => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${index === currentTabIndex ? 'active' : ''}`;
        btn.innerText = day.date;
        btn.onclick = () => {
          currentTabIndex = index;
          renderTabs();
          showMealDay(index);
        };
        tabBar.appendChild(btn);
      });
    }

    function showMealDay(index) {
      const mealGrid = document.getElementById('mealGrid');
      const meals = weeklyData[index].meals;
      mealGrid.innerHTML = '';

      for (const [time, items] of Object.entries(meals)) {
        const card = document.createElement('div');
        card.className = 'meal-card';

        let listHTML = items.map(item => `<li>• ${item}</li>`).join('');
        card.innerHTML = `<h3>${time}</h3><ul>${listHTML}</ul>`;
        
        mealGrid.appendChild(card);
      }
    }
  </script>
</body>
</html>
