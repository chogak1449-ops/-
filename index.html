<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNCP AI 비서</title>
  <style>
    /* 기본 리셋 및 다크모드 배경 설정 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #202124;
      color: #e8eaed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 상단 네비게이션 헤더 */
    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      gap: 16px;
      font-size: 14px;
    }

    header a {
      color: #e8eaed;
      text-decoration: none;
    }

    header a:hover {
      text-decoration: underline;
    }

    .profile-icon {
      width: 32px;
      height: 32px;
      background-color: #8ab4f8;
      color: #202124;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }

    /* 메인 검색 레이아웃 */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -50px; /* 시각적 중앙 맞춤 */
    }

    .logo {
      font-size: 5rem;
      font-weight: 600;
      letter-spacing: -2px;
      margin-bottom: 28px;
      user-select: none;
    }

    /* 검색창 스타일 */
    .search-box {
      width: 100%;
      max-width: 584px;
      height: 48px;
      background-color: #303134;
      border: 1px solid #5f6368;
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      transition: background-color 0.2s, box-shadow 0.2s;
    }

    .search-box:hover, .search-box:focus-within {
      background-color: #303134;
      border-color: transparent;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8eaed;
      font-size: 16px;
      margin-left: 12px;
    }

    /* 버튼 영역 */
    .btn-group {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    .btn {
      background-color: #303134;
      border: 1px solid #303134;
      color: #e8eaed;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .btn:hover {
      border: 1px solid #5f6368;
    }

    /* 하단 푸터 */
    footer {
      background-color: #171717;
      color: #9aa0a6;
      font-size: 14px;
    }

    .footer-top {
      padding: 14px 30px;
      border-bottom: 1px solid #212327;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 14px 30px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-links a {
      color: #9aa0a6;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- 상단 네비게이션 -->
  <header>
    <a href="#">안내사항</a>
    <a href="#">식단표</a>
    <div class="profile-icon">AI</div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main>
    <div class="logo">BNCP AI</div>
    
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#9aa0a6">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="userInput" placeholder="질문이나 요청사항을 입력하세요..." onkeydown="if(event.key==='Enter') handleSearch()">
    </div>

    <div class="btn-group">
      <button class="btn" onclick="handleSearch()">AI 답변 요청</button>
      <button class="btn" onclick="quickMenu()">주간 식단표 확인</button>
    </div>
  </main>

  <!-- 하단 푸터 -->
  <footer>
    <div class="footer-top">
      <span>Bismayah Camp Services</span>
    </div>
    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">소개</a>
        <a href="#">복지 안내</a>
        <a href="#">시설 문의</a>
      </div>
      <div class="footer-links">
        <a href="#">개인정보처리방침</a>
        <a href="#">설정</a>
      </div>
    </div>
  </footer>

  <script>
    function handleSearch() {
      const input = document.getElementById('userInput').value;
      if (!input.trim()) return;
      alert("입력한 내용: " + input + "\n(이곳에 AI 백엔드 연동 코드를 추가하시면 됩니다)");
    }

    function quickMenu() {
      alert("식단표 데이터를 호출합니다.");
    }
  </script>
</body>
</html>
